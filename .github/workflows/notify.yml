name: Notify Hira

on:
  push:
    branches:
      - main

jobs:
  send-text:
    runs-on: ubuntu-latest
    steps:
      - name: Send text to Hira
        run: |
          curl -s https://textbelt.com/text \
            --data-urlencode phone="${{ secrets.HIRA_PHONE }}" \
            --data-urlencode message="Ali just updated aliandhira.com — go check it out 🤍" \
            --data-urlencode key="${{ secrets.TEXTBELT_KEY }}"
